[build]
  command = "npm run build"
  publish = "dist"

# Proxy /api calls to the backend (set VITE_API_URL in env vars instead, or use this redirect)
# Uncomment and set your Render backend URL below if you want Netlify to proxy API calls:
# [[redirects]]
#   from = "/api/*"
#   to = "https://your-backend.onrender.com/api/:splat"
#   status = 200
#   force = true

# Redirect all other requests to index.html for client-side routing
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
